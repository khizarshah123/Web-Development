<!DOCTYPE html>
<html>
<head>
<title>Modern Dice Game</title>

<style>

body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: bgAnimation 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Background Animation */
@keyframes bgAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Game Container */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

/* Button Style */
button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Hover Animation */
button:hover {
    transform: scale(1.1) rotate(-2deg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* Dice Text */
#dice {
    font-size: 24px;
    margin-top: 20px;
    color: #fff;
}

/* Score */
#player1Score {
    font-size: 20px;
    color: #fff;
    margin-top: 10px;
}

/* Dice Image Animation */
#Diceimage img {
    width: 100px;
    margin-top: 20px;
    animation: roll 0.5s ease;
    filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
}

/* Dice Roll Animation */
@keyframes roll {
    0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
    100% { transform: rotate(360deg) scale(1); opacity: 1; }
}

</style>

</head>

<body>

<div class="container">

    <button onclick="player1()">🎲 Player 1</button>
    <button>🎲 Player 2</button>

    <p id="dice"></p> 
    <p id="player1Score"></p> 
    <p id="Diceimage"></p> 

</div>

<script>

    var player1Score = 0 ;

    function player1(){

        var dice = Math.floor(Math.random() * 6 + 1)

        player1Score +=dice

        document.getElementById("dice").innerHTML = "Dice : "+dice
        document.getElementById("player1Score").innerHTML = "Player1 Score : "+player1Score

        document.getElementById("Diceimage").innerHTML = '<img src="'+dice+'.JPG">'

    }
</script>

</body>
</html>
