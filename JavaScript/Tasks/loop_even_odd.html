<script>

  start = parseInt(prompt('Enter start number = '))
  end = parseInt(prompt('Enter end number = '))
   
  
  for(a=start;a<=end;a++)
{
         if(a%2==0)
         {         
                document.write('The number = ',a,' is even','<br>')
         }

         else
         {
               document.write('The number = ',a,' is odd','<br>')
         }
}

</script>
