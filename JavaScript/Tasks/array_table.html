<script>

     a = [12, 5, 3, 6]
        
    
        for(i = 0 ;i<=3;i++)

     {
               
                for(counter = 1 ; counter<=10 ; counter ++)
               {
 
                   document.write(a[i],'*',counter,'= ',a[i]*counter,'<br>');
                 
               }
 
              document.write('<br>');  
  
     }
     
 
</script>
