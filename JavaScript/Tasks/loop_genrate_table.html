<script>
  
   start =  parseInt(prompt('Enter start number = '))
   end = parseInt(prompt('Enter end number = '))
    

    for (a = start; a <= end; a++) {
            
           for(counter=1;counter<=10;counter++)
           {
                  document.write(a,'*',counter,'= ', a*counter,'<br>')
           }

           document.write('<br>')
        }
    

</script>
