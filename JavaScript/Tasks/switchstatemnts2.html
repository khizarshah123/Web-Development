<script>



    months = parseInt(prompt('enter Month = '))

    switch (months) {
        case 1:
            document.write("January ,Winter")
            break;

        case 2:
            document.write("February,Winter ")
            break;

        case 3:
            document.write("March, Spring")
            break;

        case 4:
            document.write("April, Spring")
            break;

        case 5:
            document.write("May ,Spring")
            break;

        case 6:
            document.write("June , Summer")
            break;

        case 7:
            document.write("July ,Summer")
            break;

        case 8:
            document.write("August ,Summer")
            break;

        case 9:
            document.write("September,Autum")

        case 10:
            document.write("October,Autum")


        case 11:
            document.write("November,Autum")


        case 12:
            document.write("December,Autum")
            break;



        default:
            document.write("Invalid")


    }

</script>
