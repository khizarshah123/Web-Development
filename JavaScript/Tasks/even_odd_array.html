<script>
      a = [12, 5, 3, 6]
 
      
      for(i=0;i<=3;i++)
      {
          if(a[i]%2==0)
          {
              document.write('The number = ',a[i],' is',' even','<br>')
          }

          else
          {
              document.write('The number = ',a[i],' is',' odd','<br>')
          }
      }
</script>
